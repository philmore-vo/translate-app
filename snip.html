<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EngiLink — OCR Capture</title>
  <link rel="stylesheet" href="css/snip.css">
</head>
<body>
  <div class="snip-overlay" id="snip-overlay"></div>
  <div class="snip-selection" id="snip-selection"></div>

</html>
