<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EngiLink — Lookup</title>
  <link rel="stylesheet" href="css/overlay.css">
</head>
<body>
  <div id="overlay-root" class="overlay-container">
    <!-- Header -->
    <div class="overlay-header" id="overlay-header">
      <div class="header-top">
        <div class="word-info">
          <span class="word-text" id="word-text">—</span>
          <span class="phonetic" id="phonetic-text"></span>
          <button class="btn-audio" id="btn-audio" title="Play pronunciation" style="display:none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.08"></path>
            </svg>
          </button>
        </div>
        <div class="header-actions">
          <button class="btn-fav" id="btn-fav" title="Favorite">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
          </button>
          <button class="btn-fav" id="btn-refresh" title="Refresh (re-fetch from AI)" style="display:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
          <button class="btn-close" id="btn-close" title="Close (Esc)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="part-of-speech" id="part-of-speech"></div>
      <div class="vn-meaning-header" id="vn-meaning-header" style="display:none;">
        <span class="vn-flag">🌐</span>
        <span class="vn-meaning-text" id="vn-meaning-text"></span>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab active" data-tab="dictionary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        Dictionary
      </button>
      <button class="tab" data-tab="technical">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        Tech Note
      </button>
    </div>

    <!-- Tab Content -->
    <div class="tab-content">
      <!-- Dictionary Tab -->
      <div class="tab-panel active" id="panel-dictionary">
        <div class="skeleton-loader" id="dict-loader">
          <div class="skeleton-line w80"></div>
          <div class="skeleton-line w100"></div>
          <div class="skeleton-line w60"></div>
        </div>
        <div class="definitions-list" id="definitions-list" style="display:none;"></div>
        <div class="dict-error" id="dict-error" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span>Word not found in dictionary</span>
        </div>
      </div>

      <!-- Technical Tab -->
      <div class="tab-panel" id="panel-technical">
        <div class="skeleton-loader" id="tech-loader">
          <div class="skeleton-line w100"></div>
          <div class="skeleton-line w80"></div>
          <div class="skeleton-line w90"></div>
        </div>
        <div class="tech-content" id="tech-content" style="display:none;">
          <div class="tech-definition" id="tech-definition"></div>
          <div class="tech-vn" id="tech-vn">
            <span class="vn-label">🇻🇳</span>
            <span class="vn-text" id="tech-vn-text"></span>
          </div>
          <div class="topic-badge" id="topic-badge" style="display:none;"></div>
        </div>
        <div class="tech-error" id="tech-error" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span id="tech-error-text">AI unavailable</span>
        </div>
      </div>
    </div>

    <!-- Related Words -->
    <div class="related-section" id="related-section" style="display:none;">
      <div class="related-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        Related
      </div>
      <div class="related-chips" id="related-chips"></div>
    </div>

    <!-- Footer Actions -->
    <div class="overlay-footer" id="overlay-footer">
      <button class="btn-note" id="btn-note" title="Add note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        Note
      </button>
      <button class="btn-dashboard" id="btn-dashboard" title="Open Dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Dashboard
      </button>
      <div class="lookup-count" id="lookup-count" title="Lookup count"></div>
    </div>

    <!-- Note Editor (hidden by default) -->
    <div class="note-editor" id="note-editor" style="display:none;">
      <textarea id="note-textarea" placeholder="Add your personal note..." rows="3"></textarea>
      <div class="note-actions">
        <button class="btn-note-save" id="btn-note-save">Save</button>
        <button class="btn-note-cancel" id="btn-note-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Audio player -->
  <audio id="audio-player" style="display:none;"></audio>

  <script src="js/overlay.js"></script>
</body>
</html>
